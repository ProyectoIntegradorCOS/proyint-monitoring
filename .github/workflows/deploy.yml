name: Monitoring CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── Validación — corre en PR y en push ──────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Validar docker-compose (monitoring-core)
        run: docker compose -f monitoring-core/docker-compose.yml config --quiet

      - name: Validar docker-compose (monitoring-logs)
        run: docker compose -f monitoring-logs/docker-compose.yml config --quiet

      - name: Validar docker-compose (app)
        run: docker compose -f app/docker-compose.yml config --quiet

      - name: Validar configuración de Prometheus
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v ${{ github.workspace }}/monitoring-core/prometheus:/prometheus \
            prom/prometheus:latest \
            check config /prometheus/prometheus.yml

      - name: Validar configuración de Alertmanager
        run: |
          docker run --rm \
            --entrypoint amtool \
            -v ${{ github.workspace }}/monitoring-core/alertmanager:/alertmanager \
            prom/alertmanager:latest \
            check-config /alertmanager/alertmanager.yml

  # ── Deploy monitoring-core — solo en merge a main o dispatch ────────────────
  deploy-core:
    name: Deploy monitoring-core
    runs-on: ubuntu-latest
    needs: validate
    environment: dev

    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.MONITORING_CORE_HOST }} >> ~/.ssh/known_hosts

      - name: Copiar archivos a monitoring-core
        run: |
          rsync -avz --delete monitoring-core/ \
            ec2-user@${{ secrets.MONITORING_CORE_HOST }}:/opt/monitoring/core/

      - name: Levantar stack en monitoring-core
        run: |
          ssh ec2-user@${{ secrets.MONITORING_CORE_HOST }} \
            "cd /opt/monitoring/core && docker-compose pull && docker-compose up -d"

  # ── Deploy monitoring-logs — solo en merge a main o dispatch ────────────────
  deploy-logs:
    name: Deploy monitoring-logs
    runs-on: ubuntu-latest
    needs: validate
    environment: dev

    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.MONITORING_LOGS_HOST }} >> ~/.ssh/known_hosts

      - name: Copiar archivos a monitoring-logs
        run: |
          rsync -avz --delete monitoring-logs/ \
            ec2-user@${{ secrets.MONITORING_LOGS_HOST }}:/opt/monitoring/logs/

      - name: Levantar stack en monitoring-logs
        run: |
          ssh ec2-user@${{ secrets.MONITORING_LOGS_HOST }} \
            "cd /opt/monitoring/logs && docker-compose pull && docker-compose up -d"

  # ── Deploy agentes en app EC2 — solo en merge a main o dispatch ─────────────
  deploy-app-agents:
    name: Deploy agentes en app EC2
    runs-on: ubuntu-latest
    needs: validate
    environment: dev

    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.APP_HOST }} >> ~/.ssh/known_hosts

      - name: Copiar archivos a app EC2
        run: |
          rsync -avz --delete app/ \
            ec2-user@${{ secrets.APP_HOST }}:/opt/monitoring/app/

      - name: Levantar agentes en app EC2
        run: |
          ssh ec2-user@${{ secrets.APP_HOST }} \
            "cd /opt/monitoring/app && docker-compose pull && docker-compose up -d"
