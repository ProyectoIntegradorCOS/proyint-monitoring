version: '3.8'

services:

  loki:
    image: grafana/loki:latest
    container_name: thaqhiri-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - monitoring

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: thaqhiri-otel-collector
    restart: unless-stopped
    ports:
      - "4317:4317"   # OTLP gRPC  ← recibe trazas/métricas del backend
      - "4318:4318"   # OTLP HTTP  ← recibe trazas/métricas del backend
      - "8889:8889"   # Prometheus ← Prometheus scrapeará métricas aquí
    volumes:
      - ./otel-collector/otel-collector-config.yml:/etc/otel/config.yml:ro
    command: ["--config=/etc/otel/config.yml"]
    depends_on:
      - jaeger
    networks:
      - monitoring

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: thaqhiri-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # UI
      - "14268:14268"   # Jaeger HTTP collector (legacy)
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    container_name: thaqhiri-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  loki-data: